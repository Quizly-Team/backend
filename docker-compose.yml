version: '3.8'
name: quizly

services:

  mysql:
    container_name: quizly_mysql_db
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
    volumes:
      - ./docker/mysql/db:/var/lib/mysql

  redis:
    container_name: quizly_redis
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}

  loki:
    container_name: quizly_loki
    image: grafana/loki:3.1.1
    user: "10001:10001"
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki/config/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ./docker/loki/data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    container_name: quizly_promtail
    image: grafana/promtail:3.1.1
    volumes:
      - ./docker/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ${QUIZLY_LOG_DIR:-./logs}:/var/log/quizly:ro
      - ./docker/promtail/positions:/tmp/positions
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    container_name: quizly_grafana
    image: grafana/grafana:11.1.0
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped
