server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: quizly-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: quizly-backend
          service: quizly-backend
          __path__: /var/log/quizly/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger_name
      - labels:
          level:
