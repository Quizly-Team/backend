name: Claude PR Review

on:
  pull_request:
    types: [ opened ]
    branches: [ "dev" ]
  issue_comment:
    types: [ created ]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.action == 'opened')
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.head_ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: false
          claude_args: --allowedTools "Bash(gh:*)" "Bash(git:*)" "Bash(sleep:*)" "Read"
          prompt: |
            /code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }} --comment
